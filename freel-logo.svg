<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5aa3ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon mark: abstract "F" + arrow/link shape -->
  <g transform="translate(12, 18)">
    <!-- Rounded background square -->
    <rect x="0" y="0" width="84" height="84" rx="20" ry="20" fill="url(#blueGrad)" />

    <!-- Bold minimal "F" shape built from rectangles -->
    <rect x="20" y="20" width="44" height="9" rx="4" fill="white" />
    <rect x="20" y="20" width="9" height="44" rx="4" fill="white" />
    <rect x="20" y="38" width="30" height="8" rx="3.5" fill="white" />

    <!-- Small dot accent — signals freelance/connection -->
    <circle cx="62" cy="58" r="6" fill="white" opacity="0.9"/>
  </g>

  <!-- Wordmark: "freel" -->
  <text
    x="114"
    y="74"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-2"
    fill="#0d1f4e"
  >freel</text>

  <!-- Thin underline accent -->
  <rect x="114" y="83" width="182" height="3" rx="1.5" fill="url(#accentGrad)" />

  <!-- Tagline -->
  <text
    x="115"
    y="105"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6b8ccc"
  >FREELANCE SIMPLIFIED</text>
</svg>
